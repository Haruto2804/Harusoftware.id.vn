<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Harusama Room</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/cursor.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="stylesheet" href="./css/skeleton.css" />
  </head>

  <body class="login-page" data-after-login="./index.html">
    <div class="vintage-cursor-glow"></div>
    <div class="page-texture"></div>

    <main class="login-shell">
      <section class="login-card">
        <div class="login-polaroid">
          <div class="login-avatar-frame">
            <img src="./assets/images/avatar.jpeg" alt="Harusama Avatar" />
          </div>

          <span>@HARUTO_2804</span>
        </div>

        <div class="login-content">
          <h1>Haru's Room<br />Login</h1>

          <div class="login-actions">
            <button id="loginBtn" class="login-btn" type="button">
              <span class="google-icon" aria-hidden="true">
                <svg viewBox="0 0 48 48">
                  <path
                    fill="#FFC107"
                    d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.223 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
                  />
                  <path
                    fill="#FF3D00"
                    d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
                  />
                  <path
                    fill="#4CAF50"
                    d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
                  />
                  <path
                    fill="#1976D2"
                    d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
                  />
                </svg>
              </span>

              <span>Đăng nhập Google</span>
            </button>

            <button id="logoutBtn" class="logout-btn" type="button" hidden>
              Đăng xuất
            </button>
          </div>

          <div id="status" class="login-status">
            Chưa có tài khoản Google?
            <a
              href="https://accounts.google.com/signup"
              target="_blank"
              rel="noopener noreferrer"
            >
              Đăng kí tại đây
            </a>
          </div>

          <a href="./index.html" class="login-back">← Quay về phòng chính</a>
        </div>
      </section>

      <p class="login-footer">EST. 2026 — DESIGNED FOR THE SILENT SOUL</p>
    </main>

    <script src="./js/cursor.js"></script>
    <script type="module" src="./js/login.js"></script>
    <script src="./js/skeleton.js"></script>
  </body>
</html>
